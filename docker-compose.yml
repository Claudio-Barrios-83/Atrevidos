# ============================================================================
# ATREVIDOS - Docker Compose
# ============================================================================
# La base de datos y auth están en Supabase Cloud (externo).
# Este compose solo levanta la app Node.js.
#
# Uso:
#   1. Asegúrate de tener el archivo .env con las credenciales de Supabase
#   2. Ejecuta: docker compose up -d --build
#   3. Abre: http://localhost:3000
# ============================================================================

services:
  atrevidos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atrevidos-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      # Las variables VITE_ se cargan desde .env
    restart: unless-stopped
    # Health check para monitorear que la app responde
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
