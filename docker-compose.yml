# ============================================================================
# ATREVIDOS - Docker Compose
# ============================================================================
# La base de datos y auth están en Supabase Cloud (externo).
# Este compose solo levanta la app Node.js, enrutada vía el Traefik que ya
# corre en este servidor (contenedor "traefik", stack de Portainer) hacia
# https://atrevido55.duckdns.org
#
# Requisitos previos (ver DEPLOY.md):
#   1. La red externa "proxy" debe existir y Traefik debe estar unido a ella
#      (ya es el caso en este host).
#   2. El registro DNS de atrevido55.duckdns.org debe apuntar a la IP pública
#      de ESTE servidor (actualizarlo con tu token de DuckDNS).
#   3. El puerto 80/443 del router/firewall debe reenviar a este servidor.
#
# Uso:
#   docker compose up -d --build
#   Verificar: docker compose logs -f
#   Abrir: https://atrevido55.duckdns.org
# ============================================================================

services:
  atrevidos:
    # Imagen publicada por el pipeline de CI (.github/workflows/deploy.yml)
    # en GitHub Container Registry en cada push a "main". Watchtower vigila
    # este tag "latest" y recrea el contenedor solo cuando cambia.
    image: ghcr.io/claudio-barrios-83/atrevidos:latest
    # Se mantiene "build:" como fallback opcional: si se corre
    # "docker compose up -d --build atrevidos" en este servidor, se sigue
    # pudiendo construir la imagen localmente desde el código fuente (útil
    # para debugging o si el pipeline de CI no está disponible). Cuando se
    # define "image" junto a "build", Docker Compose usa "image" como el
    # tag con el que se etiqueta el resultado del build local también.
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # docker compose sustituye estas ${VAR} leyendo el .env del proyecto.
        # Son variables públicas (se inlinean en el JS del navegador de todas
        # formas), por eso es seguro pasarlas como build args.
        PUBLIC_SUPABASE_URL: ${PUBLIC_SUPABASE_URL}
        PUBLIC_SUPABASE_ANON_KEY: ${PUBLIC_SUPABASE_ANON_KEY}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: atrevidos-app
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      # ORIGIN es obligatorio para @sveltejs/adapter-node en producción: sin
      # esta variable, el adapter asume "https" por defecto para construir
      # URLs absolutas (redirects, cookies), lo que rompe cualquier acceso
      # directo por IP/host interno (incluido el healthcheck). Debe coincidir
      # con la URL pública real detrás de Traefik.
      - ORIGIN=https://atrevido55.duckdns.org
      # Las variables PUBLIC_/VITE_ se cargan desde .env
    restart: unless-stopped
    networks:
      - proxy
    # Health check para monitorear que la app responde.
    # Usamos /login (ruta pública, sin redirect) en vez de "/" para evitar el
    # redirect 303 a la URL https pública, que wget no puede seguir desde
    # dentro del propio contenedor.
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.atrevidos.rule=Host(`atrevido55.duckdns.org`)"
      - "traefik.http.routers.atrevidos.entrypoints=websecure"
      - "traefik.http.routers.atrevidos.tls.certresolver=letsencrypt"
      - "traefik.http.services.atrevidos.loadbalancer.server.port=3000"
      # Redirección HTTP -> HTTPS (mismo patrón que el resto del stack)
      - "traefik.http.routers.atrevidos-insecure.rule=Host(`atrevido55.duckdns.org`)"
      - "traefik.http.routers.atrevidos-insecure.entrypoints=web"
      - "traefik.http.routers.atrevidos-insecure.middlewares=atrevidos-https-redirect"
      - "traefik.http.middlewares.atrevidos-https-redirect.redirectscheme.scheme=https"
      # Habilita a Watchtower (más abajo) a vigilar y actualizar SOLO este
      # contenedor cuando cambie ghcr.io/claudio-barrios-83/atrevidos:latest.
      - "com.centurylinklabs.watchtower.enable=true"

  # Watchtower: vigila la imagen ghcr.io/claudio-barrios-83/atrevidos:latest
  # y recrea automáticamente el contenedor "atrevidos-app" cuando el pipeline
  # de CI (.github/workflows/deploy.yml) publica una nueva versión tras un
  # push a "main". Es el mecanismo de "deploy" en este servidor: no hay que
  # hacer nada manual, Watchtower hace el pull + recreate.
  #
  # NOTA: la imagen histórica "containrrr/watchtower" quedó ARCHIVADA (sin
  # mantenimiento) y su cliente Docker interno es demasiado viejo para la
  # API de Docker Engine v29 que corre en este host (falla con "client
  # version 1.25 is too old"). Usamos el fork activamente mantenido por la
  # comunidad, "nicholas-fedor/watchtower" (drop-in compatible: mismos
  # flags, mismas labels), que sí soporta Docker Engine 29+.
  watchtower:
    image: ghcr.io/nicholas-fedor/watchtower:latest
    container_name: atrevidos-watchtower
    command:
      # --label-enable: solo actualiza contenedores con la label
      # com.centurylinklabs.watchtower.enable=true (la agregamos arriba al
      # servicio "atrevidos"), así Watchtower NO toca traefik, portainer,
      # pihole, wireguard ni ningún otro contenedor de este host.
      - "--label-enable"
      # Poll cada 90s: rápido para verificar que el pipeline funciona sin
      # ser agresivo. Para "producción real" más tranquila alcanza con algo
      # como 300 (5 minutos); se deja en 90 a propósito para este primer
      # despliegue, se puede subir después sin drama.
      - "--interval"
      - "90"
      # Borra las imágenes viejas una vez que el contenedor nuevo arrancó
      # sano, para no acumular versiones anteriores en disco.
      - "--cleanup"
    volumes:
      # Watchtower necesita hablar con el daemon de Docker para poder
      # inspeccionar/recrear contenedores. Montado read-only: Watchtower no
      # necesita escribir en el socket, solo leer/enviar comandos sobre él.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # Servicio OPCIONAL: mantiene el registro DNS de atrevido55.duckdns.org
  # apuntando a la IP pública de este servidor. Actívalo con:
  #   docker compose --profile duckdns up -d duckdns-updater
  # luego de definir DUCKDNS_TOKEN en tu .env (obtenerlo en https://www.duckdns.org).
  duckdns-updater:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: atrevidos-duckdns
    profiles:
      - duckdns
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - SUBDOMAINS=atrevido55
      - TOKEN=${DUCKDNS_TOKEN:-}
      - LOG_FILE=false
    restart: unless-stopped

networks:
  proxy:
    external: true
